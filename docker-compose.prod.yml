# Déploiement prod — VPS multi-apps derrière Traefik.
# Réseau traefik-public externe (déjà créé par la stack Traefik).
# HTTPS auto via certresolver letsencrypt. Redirect web->websecure + middlewares sécu = globaux à l'entrypoint.
services:
  finance-backend:
    build: ./backend
    container_name: finance-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - finance-db:/app/data
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.finance-api.rule=Host(`finance.camcamcarre.fr`) && (PathPrefix(`/api`) || PathPrefix(`/auth`) || PathPrefix(`/health`))"
      - "traefik.http.routers.finance-api.entrypoints=websecure"
      - "traefik.http.routers.finance-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.finance-api.priority=100"
      - "traefik.http.services.finance-api.loadbalancer.server.port=3000"

  finance-front:
    build:
      context: .
      dockerfile: Dockerfile.front
      args:
        VITE_API_URL: "https://finance.camcamcarre.fr"
    container_name: finance-front
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.finance.rule=Host(`finance.camcamcarre.fr`)"
      - "traefik.http.routers.finance.entrypoints=websecure"
      - "traefik.http.routers.finance.tls.certresolver=letsencrypt"
      - "traefik.http.routers.finance.priority=1"
      - "traefik.http.services.finance.loadbalancer.server.port=80"

volumes:
  finance-db:

networks:
  traefik-public:
    external: true
