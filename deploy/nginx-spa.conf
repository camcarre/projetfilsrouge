server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA : toutes les routes react-router retombent sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache long pour les assets fingerprintés
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
