name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Run pytest
        run: pytest -q
        working-directory: backend

  playwright:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build, test-backend]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

      - name: Start backend
        run: cd backend && uvicorn main:app --port 3000 &
        env:
          SECRET_KEY: ci-test-secret-key

      - name: Start frontend preview
        run: npx vite preview --port 5173 &

      - name: Wait for servers
        run: npx wait-on http://localhost:5173 http://localhost:3000/api/etfs --timeout 30000

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
